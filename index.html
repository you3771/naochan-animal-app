<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>なおちゃんどうぶつえん</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">なおちゃんどうぶつえん</h1>
    <div class="animals">
        <div class="animal-card" id="cat">
            <img src="images/cat.png" alt="ネコ">
        </div>
        <div class="animal-card" id="dog">
            <img src="images/dog.png" alt="イヌ">
        </div>
        <div class="animal-card" id="pig">
            <img src="images/pig.png" alt="ブタ">
        </div>
        <div class="animal-card" id="cow">
            <img src="images/cow.png" alt="ウシ">
        </div>
        <div class="animal-card" id="lion">
            <img src="images/lion.png" alt="ライオン">
        </div>
        <div class="animal-card" id="elephant">
            <img src="images/elephant.png" alt="ゾウ">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
